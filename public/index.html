<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>公司文件管理系统 - 登录</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a3a5c 0%, #2d6a9f 100%);
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    }

    .login-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      padding: 48px 44px 40px;
      width: 400px;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo .icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #1a3a5c, #2d6a9f);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }

    .logo .icon svg {
      width: 36px;
      height: 36px;
      fill: #fff;
    }

    .logo h1 {
      font-size: 20px;
      color: #1a3a5c;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .logo p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      color: #444;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      font-size: 15px;
      color: #222;
      outline: none;
      transition: border-color 0.2s;
      background: #fafbfc;
    }

    .form-group input:focus {
      border-color: #2d6a9f;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(45,106,159,0.12);
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #1a3a5c, #2d6a9f);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 2px;
      margin-top: 8px;
      transition: opacity 0.2s;
    }

    .btn-login:hover { opacity: 0.88; }
    .btn-login:active { opacity: 0.75; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .msg {
      margin-top: 18px;
      padding: 11px 14px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      display: none;
    }

    .msg.success {
      background: #e6f4ea;
      color: #1e7e34;
      border: 1px solid #b7dfbf;
    }

    .msg.error {
      background: #fdecea;
      color: #c0392b;
      border: 1px solid #f5c6c2;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #bbb;
      margin-top: 32px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <div class="icon">
        <!-- 文件夹图标 -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 4H2C.9 4 0 4.9 0 6v12c0 1.1.9 2 2 2h20c1.1 0 2-.9
            2-2V8c0-1.1-.9-2-2-2h-10l-2-2z"/>
        </svg>
      </div>
      <h1>公司文件管理系统</h1>
      <p>请使用您的账号登录</p>
    </div>

    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" name="username" placeholder="请输入用户名" autofocus />
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" placeholder="请输入密码" />
      </div>
      <button type="submit" class="btn-login" id="btnLogin">登 录</button>
    </form>

    <div class="msg" id="msg"></div>

    <div class="footer">© 2026 某某科技有限公司</div>
  </div>

  <script>
    const form    = document.getElementById('loginForm');
    const msgBox  = document.getElementById('msg');
    const btnLogin = document.getElementById('btnLogin');

    function showMsg(text, type) {
      msgBox.textContent = text;
      msgBox.className   = 'msg ' + type;
      msgBox.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showMsg('用户名或密码不能为空！', 'error');
        return;
      }

      btnLogin.disabled = true;
      btnLogin.textContent = '登录中...';

      try {
        const resp = await fetch('/api/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username, password }),
        });
        const data = await resp.json();

        if (data.success) {
          localStorage.setItem('username', data.user.username);
          showMsg(`登录成功，欢迎您：${data.user.name}！`, 'success');
          setTimeout(() => {
            window.location.href = '/main.html';
          }, 800);
        } else {
          showMsg(data.message, 'error');
        }
      } catch (err) {
        showMsg('网络异常，请稍后重试。', 'error');
      } finally {
        btnLogin.disabled = false;
        btnLogin.textContent = '登 录';
      }
    });

    // 回车触发登录
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') form.dispatchEvent(new Event('submit'));
    });
  </script>
</body>
</html>
