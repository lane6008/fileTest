<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文件管理系统</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* 顶部标题栏 */
    .header {
      background: linear-gradient(135deg, #1a3a5c 0%, #2d6a9f 100%);
      color: #fff;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    
    .header h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 1px;
    }
    
    .header .user-info {
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .header .logout-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: #fff;
      padding: 6px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }
    
    .header .logout-btn:hover {
      background: rgba(255,255,255,0.3);
    }
    
    /* 主内容区 */
    .main-container {
      flex: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow: hidden;
    }
    
    /* 上传区域 */
    .upload-section {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 20px;
    }
    
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #1a3a5c;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 0;
    }
    
    .section-title::before {
      content: '';
      width: 4px;
      height: 18px;
      background: #2d6a9f;
      border-radius: 2px;
    }
    
    /* 上传区域布局 */
    .upload-area {
      display: flex;
      gap: 16px;
      min-height: 200px;
      width: 100%;
    }
    
    /* 文件列表容器撑满 */
    .file-list-container {
      flex: 1;
      border: 1px solid #e1e4e8;
      border-radius: 8px;
      overflow: hidden;
      width: calc(100% - 196px);
    }
    
    /* 左侧拖拽区 */
    .drop-zone {
      width: 180px;
      min-width: 180px;
      border: 2px dashed #d0d7de;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      background: #fafbfc;
    }
    
    .drop-zone:hover, .drop-zone.dragover {
      border-color: #2d6a9f;
      background: #f0f5ff;
    }
    
    .drop-zone .plus-icon {
      font-size: 48px;
      color: #2d6a9f;
      margin-bottom: 12px;
    }
    
    .drop-zone .drop-text {
      font-size: 13px;
      color: #666;
      text-align: center;
      line-height: 1.6;
    }
    
    .drop-zone input[type="file"] {
      display: none;
    }
    
    /* 右侧文件列表 - 已在上面的样式中定义 */
    
    .file-list-header {
      display: flex;
      background: #f6f8fa;
      border-bottom: 1px solid #e1e4e8;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 600;
      color: #444;
    }
    
    .file-list-body {
      max-height: 200px;
      overflow-y: auto;
    }
    
    .file-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
    }
    
    .file-item:last-child {
      border-bottom: none;
    }
    
    .file-item:hover {
      background: #f6f8fa;
    }
    
    /* 列宽固定 - 上传区域（百分比相对值） */
    .file-list-header, .file-item {
      display: flex;
      width: 100%;
      gap: 2%;
    }
    .col-filename { width: 25%; }
    .col-type { width: 15%; }
    .col-desc { width: 48%; }
    .col-action { width: 10%; text-align: center; }
    
    .file-item input, .file-item select, .file-item textarea {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #d0d7de;
      border-radius: 4px;
      font-size: 13px;
      outline: none;
    }
    
    .file-item input:focus, .file-item select:focus, .file-item textarea:focus {
      border-color: #2d6a9f;
    }
    
    .file-item textarea {
      resize: vertical;
      min-height: 32px;
      max-height: 80px;
    }
    
    .file-item select {
      cursor: pointer;
    }
    
    .delete-btn {
      background: #ff4d4f;
      color: #fff;
      border: none;
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    
    .delete-btn:hover {
      background: #ff7875;
    }
    
    /* 提交按钮 - 放在标题右侧 */
    .submit-btn-inline {
      background: linear-gradient(135deg, #1a3a5c, #2d6a9f);
      color: #fff;
      border: none;
      padding: 8px 24px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: opacity 0.2s;
    }
    
    .submit-btn-inline:hover:not(:disabled) {
      opacity: 0.9;
    }
    
    .submit-btn-inline:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .submit-btn-inline .loading {
      width: 14px;
      height: 14px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    /* 旧的提交区域样式保留但不使用 */
    .submit-area {
      display: none;
    }
    
    .submit-btn {
      background: linear-gradient(135deg, #1a3a5c, #2d6a9f);
      color: #fff;
      border: none;
      padding: 10px 32px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: opacity 0.2s;
    }
    
    .submit-btn:hover:not(:disabled) {
      opacity: 0.9;
    }
    
    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .submit-btn .loading {
      width: 16px;
      height: 16px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* 文件列表区域 */
    .list-section {
      flex: 1;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    /* 类型标签 - 设计图样式 */
    .type-tabs {
      display: flex;
      margin-top: 12px;
      margin-bottom: 16px;
      border: 1px solid #d0d7de;
      border-bottom: none;
      background: #f6f8fa;
      border-radius: 8px 8px 0 0;
      padding: 0;
    }
    
    .type-tab {
      padding: 10px 20px;
      border: none;
      border-right: 1px solid #d0d7de;
      border-bottom: 2px solid transparent;
      background: transparent;
      cursor: pointer;
      font-size: 14px;
      color: #666;
      transition: all 0.2s;
      position: relative;
      margin-bottom: -1px;
    }
    
    .type-tab:last-child {
      border-right: none;
    }
    
    .type-tab:hover {
      color: #2d6a9f;
      background: rgba(45,106,159,0.05);
    }
    
    .type-tab.active {
      color: #2d6a9f;
      border-bottom-color: #2d6a9f;
      background: #fff;
      font-weight: 600;
    }
    
    /* 文件表格 */
    .file-table-container {
      flex: 1;
      overflow: auto;
      border: 1px solid #e1e4e8;
      border-radius: 8px;
    }
    
    .file-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    
    .file-table th {
      background: #f6f8fa;
      padding: 12px 8px;
      text-align: left;
      font-weight: 600;
      color: #444;
      border-bottom: 1px solid #e1e4e8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .file-table td {
      padding: 12px 8px;
      border-bottom: 1px solid #f0f0f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .file-table tr:hover td {
      background: #f6f8fa;
    }
    
    /* 表格列宽 - 百分比相对值 */
    .file-table { table-layout: fixed; width: 100%; }
    .file-table .col-id { width: 6%; }
    .file-table .col-name { width: 18%; }
    .file-table .col-type2 { width: 7%; }
    .file-table .col-desc2 { width: 20%; }
    .file-table .col-uploader { width: 9%; }
    .file-table .col-dept { width: 10%; }
    .file-table .col-size { width: 9%; }
    .file-table .col-time { width: 11%; }
    .file-table .col-thumb { width: 8%; }
    .file-table .col-op { width: 12%; }
    
    .file-table .col-desc2 {
      white-space: normal;
      word-break: break-all;
    }
    
    /* 缩略图 */
    .thumb-preview {
      width: 60px;
      height: 40px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid #e1e4e8;
    }
    
    .thumb-placeholder {
      width: 60px;
      height: 40px;
      background: #f0f0f0;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #999;
    }
    
    /* 操作按钮 */
    .action-btns {
      display: flex;
      gap: 6px;
      flex-wrap: nowrap;
    }
    
    .action-btn {
      padding: 4px 8px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    
    .action-btn.copy {
      background: #8bb4dd;
      color: #fff;
    }
    
    .action-btn.download {
      background: #8bb4dd;
      color: #fff;
    }
    
    .action-btn.edit {
      background: #8bb4dd;
      color: #fff;
    }
    
    .action-btn.delete {
      background: #8bb4dd;
      color: #fff;
    }
    
    .action-btn:hover {
      opacity: 0.85;
    }
    
    /* 分页 */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0 0;
      border-top: 1px solid #e1e4e8;
      margin-top: 16px;
    }
    
    .page-size {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #666;
    }
    
    .page-size select {
      padding: 5px 10px;
      border: 1px solid #d0d7de;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    
    .page-info {
      font-size: 13px;
      color: #666;
    }
    
    .page-btns {
      display: flex;
      gap: 8px;
    }
    
    .page-btn {
      padding: 6px 14px;
      border: 1px solid #d0d7de;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    
    .page-btn:hover:not(:disabled) {
      border-color: #2d6a9f;
      color: #2d6a9f;
    }
    
    .page-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .page-btn.active {
      background: #2d6a9f;
      color: #fff;
      border-color: #2d6a9f;
    }
    
    /* 弹窗 */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .modal-overlay.show {
      display: flex;
    }
    
    .modal {
      background: #fff;
      border-radius: 8px;
      padding: 24px 32px;
      min-width: 300px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    
    .modal-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    
    .modal-icon.success { color: #52c41a; }
    .modal-icon.error { color: #ff4d4f; }
    .modal-icon.loading { color: #2d6a9f; }
    
    .modal-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .modal-msg {
      font-size: 14px;
      color: #666;
      margin-bottom: 16px;
    }
    
    .modal-btn {
      background: #2d6a9f;
      color: #fff;
      border: none;
      padding: 8px 24px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    
    .modal-btn:hover {
      opacity: 0.9;
    }
    
    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 60px;
      color: #999;
    }
    
    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <!-- 顶部标题栏 -->
  <div class="header">
    <h1>文件管理系统</h1>
    <div class="user-info">
      <span id="currentUser">欢迎，...</span>
      <button class="logout-btn" onclick="logout()">退出登录</button>
    </div>
  </div>
  
  <!-- 主内容区 -->
  <div class="main-container">
    <!-- 上传区域 -->
    <div class="upload-section">
      <div class="section-header">
        <div class="section-title">文件上传</div>
        <button class="submit-btn-inline" id="submitBtn" onclick="submitUpload()">
          <span>提交上传</span>
        </button>
      </div>
      
      <div class="upload-area">
        <!-- 左侧拖拽区 -->
        <div class="drop-zone" id="dropZone">
          <div class="plus-icon">+</div>
          <div class="drop-text">
            点击或拖拽文件<br>到此处上传<br>
            <small style="color:#999">支持多文件上传</small>
          </div>
          <input type="file" id="fileInput" multiple>
        </div>
        
        <!-- 右侧文件列表 -->
        <div class="file-list-container">
          <div class="file-list-header">
            <div class="col-filename">文件名</div>
            <div class="col-type">文件类型</div>
            <div class="col-desc">文件描述</div>
            <div class="col-action">操作</div>
          </div>
          <div class="file-list-body" id="uploadFileList">
            <!-- 动态生成 -->
          </div>
        </div>
      </div>
      
      <div class="submit-area" style="display:none;">
        <button class="submit-btn" id="submitBtnOld">
          <span>提交上传</span>
        </button>
      </div>
    </div>
    
    <!-- 文件列表区域 -->
    <div class="list-section">
      <div class="section-title">文件列表</div>
      
      <!-- 类型标签 -->
      <div class="type-tabs" id="typeTabs">
        <div class="type-tab active" data-type="全部">全部</div>
        <div class="type-tab" data-type="Word">Word</div>
        <div class="type-tab" data-type="Excel">Excel</div>
        <div class="type-tab" data-type="PPT">PPT</div>
        <div class="type-tab" data-type="PDF">PDF</div>
        <div class="type-tab" data-type="图片">图片</div>
        <div class="type-tab" data-type="3D模型">3D模型</div>
        <div class="type-tab" data-type="视频">视频</div>
        <div class="type-tab" data-type="音频">音频</div>
        <div class="type-tab" data-type="其他">其他</div>
      </div>
      
      <!-- 文件表格 -->
      <div class="file-table-container">
        <table class="file-table">
          <thead>
            <tr>
              <th class="col-id">编号</th>
              <th class="col-name">文件名</th>
              <th class="col-type2">类型</th>
              <th class="col-desc2">描述</th>
              <th class="col-uploader">上传人</th>
              <th class="col-dept">部门</th>
              <th class="col-size">文件大小</th>
              <th class="col-time">上传时间</th>
              <th class="col-thumb">缩略图</th>
              <th class="col-op">操作</th>
            </tr>
          </thead>
          <tbody id="fileTableBody">
            <!-- 动态生成 -->
          </tbody>
        </table>
      </div>
      
      <!-- 分页 -->
      <div class="pagination">
        <div class="page-size">
          <span>每页显示：</span>
          <select id="pageSize" onchange="changePageSize()">
            <option value="20">20</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
          <span>条</span>
        </div>
        <div class="page-info">
          共 <span id="totalCount">0</span> 条记录
        </div>
        <div class="page-btns" id="pageBtns">
          <!-- 动态生成 -->
        </div>
      </div>
    </div>
  </div>
  
  <!-- 弹窗 -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-icon" id="modalIcon">✓</div>
      <div class="modal-title" id="modalTitle">提示</div>
      <div class="modal-msg" id="modalMsg">...</div>
      <button class="modal-btn" id="modalBtn" onclick="closeModal()">确定</button>
    </div>
  </div>

  <script>
    // 全局变量
    let currentUser = null;
    let uploadFiles = [];
    let currentType = '全部';
    let currentPage = 1;
    let pageSize = 20;
    let totalFiles = 0;
    
    // 文件类型映射
    const FILE_TYPE_MAP = {
      'Word': ['doc', 'docx'],
      'Excel': ['xls', 'xlsx', 'csv'],
      'PPT': ['ppt', 'pptx'],
      'PDF': ['pdf'],
      '图片': ['jpg', 'jpeg', 'png', 'bmp', 'gif', 'tif', 'tiff', 'webp', 'psd', 'ai', 'svg'],
      '3D模型': ['obj', 'fbx', 'stl', '3ds', 'c4d', 'glb', 'blend'],
      '视频': ['mp4', 'avi', 'wmv', 'mov', 'flv', 'webm', 'm4v', 'mkv'],
      '音频': ['mp3', 'wav', 'aac', 'm4a', 'flac'],
    };
    
    const FILE_TYPES = ['Word', 'Excel', 'PPT', 'PDF', '图片', '3D模型', '视频', '音频', '其他'];
    
    // 初始化
    document.addEventListener('DOMContentLoaded', async () => {
      await checkLogin();
      setupDropZone();
      setupTypeTabs();
      loadFileList();
    });
    
    // 检查登录状态
    async function checkLogin() {
      const username = localStorage.getItem('username');
      if (!username) {
        window.location.href = '/';
        return;
      }
      
      try {
        const resp = await fetch('/api/user', {
          headers: { 'X-Username': username }
        });
        const data = await resp.json();
        
        if (data.success) {
          currentUser = data.user;
          document.getElementById('currentUser').textContent = `欢迎，${data.user.real_name}`;
        } else {
          logout();
        }
      } catch (err) {
        logout();
      }
    }
    
    // 退出登录
    function logout() {
      localStorage.removeItem('username');
      window.location.href = '/';
    }
    
    // 设置拖拽区
    function setupDropZone() {
      const dropZone = document.getElementById('dropZone');
      const fileInput = document.getElementById('fileInput');
      
      dropZone.addEventListener('click', () => fileInput.click());
      
      fileInput.addEventListener('change', (e) => {
        handleFiles(e.target.files);
        fileInput.value = '';
      });
      
      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
      });
      
      dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
      });
      
      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        handleFiles(e.dataTransfer.files);
      });
    }
    
    // 处理文件
    function handleFiles(files) {
      for (const file of files) {
        const ext = file.name.split('.').pop().toLowerCase();
        const fileType = detectFileType(ext);
        
        const reader = new FileReader();
        reader.onload = (e) => {
          const base64 = e.target.result.split(',')[1];
          uploadFiles.push({
            id: Date.now() + Math.random(),
            file: file,
            filename: file.name,
            originalName: file.name,
            fileType: fileType,
            fileExt: ext,
            description: '',
            fileSize: file.size,
            fileData: base64
          });
          renderUploadList();
        };
        reader.readAsDataURL(file);
      }
    }
    
    // 检测文件类型
    function detectFileType(ext) {
      for (const [type, exts] of Object.entries(FILE_TYPE_MAP)) {
        if (exts.includes(ext)) return type;
      }
      return '其他';
    }
    
    // 渲染上传列表
    function renderUploadList() {
      const container = document.getElementById('uploadFileList');
      container.innerHTML = '';
      
      uploadFiles.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'file-item';
        div.innerHTML = `
          <div class="col-filename">
            <input type="text" value="${item.filename}" onchange="updateFileName(${index}, this.value)">
          </div>
          <div class="col-type">
            <select onchange="updateFileType(${index}, this.value)">
              ${FILE_TYPES.map(t => `<option value="${t}" ${t === item.fileType ? 'selected' : ''}>${t}</option>`).join('')}
            </select>
          </div>
          <div class="col-desc">
            <textarea placeholder="请输入文件描述" onchange="updateFileDesc(${index}, this.value)">${item.description}</textarea>
          </div>
          <div class="col-action">
            <button class="delete-btn" onclick="removeFile(${index})">删除</button>
          </div>
        `;
        container.appendChild(div);
      });
    }
    
    // 更新文件名
    function updateFileName(index, value) {
      uploadFiles[index].filename = value;
    }
    
    // 更新文件类型
    function updateFileType(index, value) {
      uploadFiles[index].fileType = value;
    }
    
    // 更新文件描述
    function updateFileDesc(index, value) {
      uploadFiles[index].description = value;
    }
    
    // 删除文件
    function removeFile(index) {
      uploadFiles.splice(index, 1);
      renderUploadList();
    }
    
    // 提交上传 - 前端模拟
    async function submitUpload() {
      if (uploadFiles.length === 0) {
        showModal('error', '错误', '请先选择要上传的文件');
        return;
      }
      
      // 检查必填项
      for (const file of uploadFiles) {
        if (!file.filename.trim()) {
          showModal('error', '错误', '文件名不能为空');
          return;
        }
      }
      
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<div class="loading"></div><span>上传中...</span>';
      
      showModal('loading', '上传中', '正在上传文件，请稍候...', false);
      
      // 模拟上传延迟
      setTimeout(() => {
        showModal('success', '上传成功', `成功上传 ${uploadFiles.length} 个文件`);
        uploadFiles = [];
        renderUploadList();
        btn.disabled = false;
        btn.innerHTML = '<span>提交上传</span>';
      }, 1500);
    }
    
    // 设置类型标签
    function setupTypeTabs() {
      const tabs = document.querySelectorAll('.type-tab');
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          currentType = tab.dataset.type;
          currentPage = 1;
          loadFileList();
        });
      });
    }
    
    // 加载文件列表
    async function loadFileList() {
      try {
        const resp = await fetch(`/api/files?type=${encodeURIComponent(currentType)}&page=${currentPage}&pageSize=${pageSize}`);
        const data = await resp.json();
        
        if (data.success) {
          renderFileTable(data.files);
          totalFiles = data.total;
          document.getElementById('totalCount').textContent = totalFiles;
          renderPagination();
        }
      } catch (err) {
        console.error('加载文件列表失败', err);
      }
    }
    
    // 渲染文件表格
    function renderFileTable(files) {
      const tbody = document.getElementById('fileTableBody');
      
      if (files.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="10">
              <div class="empty-state">
                <div class="empty-state-icon">📁</div>
                <div>暂无文件</div>
              </div>
            </td>
          </tr>
        `;
        return;
      }
      
      tbody.innerHTML = files.map(file => `
        <tr>
          <td class="col-id">${file.id}</td>
          <td class="col-name" title="${file.filename}">${file.filename}</td>
          <td class="col-type2">${file.file_type}</td>
          <td class="col-desc2" title="${file.description || ''}">${file.description || '-'}</td>
          <td class="col-uploader">${file.uploader_name}</td>
          <td class="col-dept">${file.dept_name}</td>
          <td class="col-size">${file.file_size_formatted}</td>
          <td class="col-time">${formatDate(file.created_at)}</td>
          <td class="col-thumb">
            ${file.file_type === '图片' 
              ? `<img src="${file.s3_url}" class="thumb-preview" onerror="this.parentElement.innerHTML='<div class=\\'thumb-placeholder\\'>无预览</div>'">`
              : '<div class="thumb-placeholder">无预览</div>'
            }
          </td>
          <td class="col-op">
            <div class="action-btns">
              <button class="action-btn copy">复制URL</button>
              <button class="action-btn download">下载</button>
              <button class="action-btn edit">修改</button>
              <button class="action-btn delete">删除</button>
            </div>
          </td>
        </tr>
      `).join('');
    }
    
    // 渲染分页
    function renderPagination() {
      const totalPages = Math.ceil(totalFiles / pageSize);
      const container = document.getElementById('pageBtns');
      
      let html = `
        <button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>
      `;
      
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
          html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
        } else if (i === currentPage - 3 || i === currentPage + 3) {
          html += `<span>...</span>`;
        }
      }
      
      html += `
        <button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>
      `;
      
      container.innerHTML = html;
    }
    
    // 切换页码
    function goToPage(page) {
      const totalPages = Math.ceil(totalFiles / pageSize);
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      loadFileList();
    }
    
    // 切换每页条数
    function changePageSize() {
      pageSize = parseInt(document.getElementById('pageSize').value);
      currentPage = 1;
      loadFileList();
    }
    
    // 查看文件
    function viewFile(url) {
      window.open(url, '_blank');
    }
    
    // 删除文件
    async function deleteFile(id) {
      if (!confirm('确定要删除该文件吗？')) return;
      
      try {
        const username = localStorage.getItem('username');
        const resp = await fetch(`/api/files/${id}`, {
          method: 'DELETE',
          headers: { 'X-Username': username }
        });
        
        const data = await resp.json();
        if (data.success) {
          showModal('success', '删除成功', '文件已删除');
          loadFileList();
        } else {
          showModal('error', '删除失败', data.message);
        }
      } catch (err) {
        showModal('error', '删除失败', '网络错误');
      }
    }
    
    // 显示弹窗
    function showModal(type, title, msg, showBtn = true) {
      const modal = document.getElementById('modal');
      const icon = document.getElementById('modalIcon');
      const titleEl = document.getElementById('modalTitle');
      const msgEl = document.getElementById('modalMsg');
      const btn = document.getElementById('modalBtn');
      
      icon.className = 'modal-icon ' + type;
      icon.textContent = type === 'success' ? '✓' : type === 'error' ? '✗' : '⟳';
      titleEl.textContent = title;
      msgEl.textContent = msg;
      btn.style.display = showBtn ? 'inline-block' : 'none';
      
      modal.classList.add('show');
    }
    
    // 关闭弹窗
    function closeModal() {
      document.getElementById('modal').classList.remove('show');
    }
    
    // 格式化日期
    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return date.toLocaleString('zh-CN', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }
  </script>
</body>
</html>
